name: .NET format

inputs:
  WORKING_DIRECTORY:
    required: true
    type: string
  SHELL:
    required: false
    type: string
    default: "bash"
  CSHARPIER_VERSION:
    required: false
    type: string
    default: ""

runs:
  using: composite
  steps:
    - name: Install code formatter
      shell: ${{ inputs.SHELL }}
      run: dotnet tool update --tool-path /tmp/dotnet-tools csharpier ${{ inputs.CSHARPIER_VERSION != '' && format('--version {0}', inputs.CSHARPIER_VERSION) || '' }}
      working-directory: ${{ inputs.WORKING_DIRECTORY }}

    - name: Check code formatting
      shell: ${{ inputs.SHELL }}
      # CSharpier 1.0 renamed the binary from `dotnet-csharpier` to `csharpier` and
      # switched to subcommand syntax (`csharpier check .` vs `dotnet-csharpier . --check`).
      run: |
        if [ -x /tmp/dotnet-tools/csharpier ]; then
          VERSION=$(/tmp/dotnet-tools/csharpier --version 2>/dev/null || echo "0")
        elif [ -x /tmp/dotnet-tools/dotnet-csharpier ]; then
          VERSION=$(/tmp/dotnet-tools/dotnet-csharpier --version 2>/dev/null || echo "0")
        else
          echo "csharpier not found in /tmp/dotnet-tools" >&2
          exit 1
        fi
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        if [ "${MAJOR:-0}" -ge 1 ]; then
          /tmp/dotnet-tools/csharpier check .
        else
          /tmp/dotnet-tools/dotnet-csharpier . --check
        fi
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
