name: .NET format

inputs:
  WORKING_DIRECTORY:
    required: true
    type: string
  SHELL:
    required: false
    type: string
    default: "bash"
  CSHARPIER_VERSION:
    required: false
    type: string
    default: ""

runs:
  using: composite
  steps:
    - name: Install code formatter
      shell: ${{ inputs.SHELL }}
      run: dotnet tool update --tool-path /tmp/dotnet-tools csharpier ${{ inputs.CSHARPIER_VERSION != '' && format('--version {0}', inputs.CSHARPIER_VERSION) || '' }}
      working-directory: ${{ inputs.WORKING_DIRECTORY }}

    - name: Check code formatting
      shell: ${{ inputs.SHELL }}
      run: |
        CSHARPIER_VERSION=$(/tmp/dotnet-tools/dotnet-csharpier --version)

        echo "CSharpier version: $CSHARPIER_VERSION"

        if [[ "$CSHARPIER_VERSION" == 0.* ]]; then
          /tmp/dotnet-tools/dotnet-csharpier . --check
        else
          /tmp/dotnet-tools/csharpier check .
        fi
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
