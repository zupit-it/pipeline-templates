name: .NET build

inputs:
  WORKING_DIRECTORY:
    required: true
    type: string
  BUILD_CONFIG:
    required: true
    type: string
  DISABLE_CACHE:
    required: false
    type: boolean
    default: false
    description: "Deprecated. NuGet caching was removed; restore on warp runners is faster than the ~900MB cache round-trip. Kept for backward compatibility."
  SHELL:
    required: false
    type: string
    default: "bash"

runs:
  using: composite
  steps:
    - name: Restore dependencies
      shell: ${{ inputs.SHELL }}
      run: dotnet restore --locked-mode
      working-directory: ${{ inputs.WORKING_DIRECTORY }}

    - name: Build
      shell: ${{ inputs.SHELL }}
      run: dotnet build --no-restore --configuration "${{ inputs.BUILD_CONFIG }}"
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
