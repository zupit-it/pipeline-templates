name: .NET test

inputs:
  WORKING_DIRECTORY:
    required: true
    type: string
  GENERATE_CODE_COVERAGE:
    required: false
    type: boolean
    default: true
  EXCLUDE_FILES:
    required: false
    type: boolean
    default: ""
  SHELL:
    required: false
    type: string
    default: "bash"

runs:
  using: composite
  steps:
    - name: Run tests with coverage report
      if: ${{ inputs.GENERATE_CODE_COVERAGE == 'true' }}
      shell: "bash"
      env:
        EXCLUDE_FILES: ${{ inputs.EXCLUDE_FILES }}
      run: |
        params=()

        # Coverlet's ExcludeByFile matches against ABSOLUTE source paths on the runner
        # (e.g. /__w/<repo>/<dir>/Foo/Bar.cs), but the exclusion globs are authored
        # project-relative for Sonar (e.g. "Foo/**", "Dir/File.cs"). An unanchored pattern
        # never matches an absolute path, so without the **/ prefix Coverlet silently
        # instruments everything anyway (a large generated project like EF migrations then
        # dominates the "Calculating coverage result" phase). Anchor each pattern with **/
        # unless it is already anchored (**/…) or absolute (/…) so the exclusions take effect.
        if [[ -n "$EXCLUDE_FILES" ]]; then
          IFS=',' read -ra _patterns <<< "$EXCLUDE_FILES"
          _anchored=()
          for p in "${_patterns[@]}"; do
            p="${p#"${p%%[![:space:]]*}"}"   # trim leading whitespace
            p="${p%"${p##*[![:space:]]}"}"   # trim trailing whitespace
            [[ -z "$p" ]] && continue
            case "$p" in
              '**/'* | /*) ;; # already anchored or absolute
              *) p="**/$p" ;;
            esac
            _anchored+=("$p")
          done
          exclude_by_file=$(IFS=,; echo "${_anchored[*]}")
          # The value is a comma-separated list. Wrap it in literal quotes: MSBuild strips
          # the quotes when reading the property, but without them it splits the value on
          # commas into separate -p switches (each fragment after the first has no '=',
          # causing "MSB1006: Property is not valid").
          params+=(-p:ExcludeByFile=\"$exclude_by_file\")
        fi

        dotnet test --no-build \
          --logger trx -p:CollectCoverage=true \
          -p:CoverletOutputFormat=opencover \
          "${params[@]}"

      working-directory: ${{ inputs.WORKING_DIRECTORY }}

    - name: Run tests
      if: ${{ inputs.GENERATE_CODE_COVERAGE == 'false' }}
      shell: ${{ inputs.SHELL }}
      run: dotnet test --no-build
      working-directory: ${{ inputs.WORKING_DIRECTORY }}
