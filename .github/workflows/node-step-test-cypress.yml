name: Test Javascript apps using Cypress

on:
  workflow_call:
    inputs:
      # NOTE: RUN_ON default kept at warp-ubuntu-latest-x64-4x because we have no
      # WarpBuild profiling data for this template. Sibling workflows in this
      # directory were tuned from a 7-day provisus usage export (x.json) which
      # showed CPU-light jobs (deploy, workdir-has-changes, jobs-succeded, lint,
      # jira, release) safely fitting on a 2x runner, while build / sonar-analyze
      # / dotnet-common / lint-check-build saturated 4x. This template was not
      # exercised in that window so its CPU profile is unknown. Before lowering
      # the default to warp-ubuntu-latest-x64-2x: capture max_sustained_cpu and
      # max_memory_utilization for one full run on 4x, and downsize only if p95
      # CPU% stays below ~50% (fits in 2 vCPU at <85% load). For mixed-profile
      # templates introduce a per-job override (e.g. RUN_ON_BUILD) following the
      # split done in dotnet-step-azure-webapp-build-and-deploy.yml.
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      WORKING_DIRECTORY:
        required: true
        type: string
      CYPRESS_IMAGE:
        required: true
        type: string
      COVERAGE_ARTIFACT_NAME:
        required: true
        type: string
      BROWSER:
        required: false
        type: string
        default: "chrome"
      TESTS_TIMEOUT:
        required: false
        type: number
        default: 30
      RUN:
        required: false
        type: boolean
        default: true
      PROJECT:
        required: false
        type: string
        default: ""

env: "${{secrets}}"

jobs:
  cypress-run:
    if: ${{ inputs.RUN }}
    timeout-minutes: ${{ inputs.TESTS_TIMEOUT }}
    runs-on: ${{ inputs.RUN_ON }}
    container:
      image: ${{ inputs.CYPRESS_IMAGE }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with private NPM package
        if: ${{ env.github_token }}
        run: echo "//npm.pkg.github.com/:_authToken=${{ env.github_token }}" > ~/.npmrc

      - name: Set NPM cache directory
        run: echo "NPM_CONFIG_CACHE=$(mktemp -d)" >> $GITHUB_ENV

      - run: npm config set cache /tmp/npm_cache && npm ci

      - name: Cypress run
        uses: cypress-io/github-action@v4
        if: ${{ inputs.PROJECT == '' }}
        with:
          install: false
          command: npm run ci:e2e
          working-directory: ${{ inputs.WORKING_DIRECTORY }}
          browser: ${{ inputs.BROWSER }}

      - name: Cypress run
        uses: cypress-io/github-action@v4
        if: ${{ inputs.PROJECT != '' }}
        with:
          install: false
          command: npm run ${{ inputs.PROJECT }}:ci:e2e
          working-directory: ${{ inputs.WORKING_DIRECTORY }}
          browser: ${{ inputs.BROWSER }}

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.COVERAGE_ARTIFACT_NAME }}
          path: ${{ inputs.WORKING_DIRECTORY }}/coverage/lcov.info
          retention-days: 1
