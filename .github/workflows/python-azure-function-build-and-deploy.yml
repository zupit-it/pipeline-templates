name: Docker build and push image

on:
  workflow_call:
    inputs:
      # NOTE: RUN_ON default kept at warp-ubuntu-latest-x64-4x because we have no
      # WarpBuild profiling data for this template. Sibling workflows in this
      # directory were tuned from a 7-day provisus usage export (x.json) which
      # showed CPU-light jobs (deploy, workdir-has-changes, jobs-succeded, lint,
      # jira, release) safely fitting on a 2x runner, while build / sonar-analyze
      # / dotnet-common / lint-check-build saturated 4x. This template was not
      # exercised in that window so its CPU profile is unknown. Before lowering
      # the default to warp-ubuntu-latest-x64-2x: capture max_sustained_cpu and
      # max_memory_utilization for one full run on 4x, and downsize only if p95
      # CPU% stays below ~50% (fits in 2 vCPU at <85% load). For mixed-profile
      # templates introduce a per-job override (e.g. RUN_ON_BUILD) following the
      # split done in dotnet-step-azure-webapp-build-and-deploy.yml.
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      DIND_IMAGE:
        required: false
        type: string
        default: "docker:26.0.0-dind"
      PYTHON_VERSION:
        required: true
        type: string
      AZURE_FUNCTIONAPP_NAME:
        required: true
        type: string
      AZURE_FUNCTIONAPP_PACKAGE_PATH:
        required: true
        type: string
      SLOT_NAME:
        required: false
        type: string
    secrets:
      AZURE_FUNCTIONAPP_PUBLISH_PROFILE:
        required: true

env: "${{secrets}}"

jobs:
  build-and-deploy:
    runs-on: ${{ inputs.RUN_ON }}
    container:
      image: ${{ inputs.DIND_IMAGE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ inputs.PYTHON_VERSION }} Environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.PYTHON_VERSION }}

      - name: "Resolve Project Dependencies Using Pip"
        shell: bash
        run: |
          pushd './${{ inputs.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: "Run Azure Functions Action"
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ inputs.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ inputs.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          slot-name: ${{ inputs.SLOT_NAME }}
          respect-funcignore: true
