name: Springboot common

on:
  workflow_call:
    inputs:
      WORKING_DIRECTORY:
        required: true
        type: string
      JAVA_IMAGE:
        required: true
        type: string
      COVERAGE_ARTIFACT_NAME:
        required: false
        type: string
        default: "target"
      MAVEN_USER_HOME:
        required: false
        type: string
        default: "./m2"
      EXTRA_MAVEN_ARGS:
        required: false
        type: string
        default: ""
      USE_CI_POSTGRES:
        required: false
        type: boolean
        default: true
      RUN:
        required: false
        type: boolean
        default: true
      DATABASE:
        required: false
        type: string
        description: "Database to use: postgres or mysql"
        default: "postgres"
      CHECK_WORKDIR_CHANGES:
        required: true
        type: boolean
        default: false
      CHECK_CUSTOM_DIR:
        required: false
        type: string
        default: ""
      CHECK_CHANGES_BY_JOBS:
        required: false
        type: string
        default: "all"
      MAVEN_SERVER_USERNAME:
        required: false
        type: string
      MAVEN_SERVER_ID:
        required: false
        type: string
      RUN_ON:
        required: false
        type: string
        default: "zupit-agents"
        description: "Runner for cheap jobs (workdir-has-changes, jobs-succeded). Both match cheap patterns profiled at p95 CPU < 13% on 4x in sibling templates."
      # NOTE: RUN_ON_BUILD now drives springboot-step-tests and
      # springboot-step-tests-mysql only. Lint moved to RUN_ON_LINT (see below)
      # after the May-2026 runner-sizing sweep showed the linter is cheap.
      # The tests-mysql suite was the most expensive job in the export
      # (gh-2vCPU baseline ≈ 942s across 497 runs → ~273s on warp-4x, ~136s on
      # warp-8x). 4x is the maximum default until someone confirms 8x is
      # warranted on the actual warp profile; raise per-consumer otherwise.
      RUN_ON_BUILD:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
        description: "Runner forwarded to springboot-step-tests and springboot-step-tests-mysql. Tests-mysql wall ≈ 273s on warp-4x; consider 8x per-consumer for the biggest test suites. The arm64 flavor of the same size is ~25% cheaper - override to warp-ubuntu-latest-arm64-4x if your container image is multi-arch."
      # RUN_ON_LINT: the linter is light (gh-2vCPU baseline ≈ 152s across 499
      # runs → ~88s on warp-2x in profiling). 2x is the right default.
      RUN_ON_LINT:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-2x"
        description: "Runner forwarded to springboot-step-lint-check. p95 wall on warp-2x ≈ 88s in May-2026 sizing data."
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"

env:
  CHECK_DIR: ${{ inputs.WORKING_DIRECTORY }}

jobs:
  workdir-has-changes:
    runs-on:
      labels: ${{ inputs.RUN_ON }}
      group: ${{ inputs.RUNNERS_CONTAINER_GROUP }}
    container: buildpack-deps:24.04-scm
    outputs:
      changes-detected: ${{ steps.filter.outputs.changes-detected }}
    steps:
      - name: Set CHECK_DIR to custom directory if provided
        if: ${{ inputs.CHECK_CUSTOM_DIR != '' }}
        run: echo "CHECK_DIR=${{ inputs.CHECK_CUSTOM_DIR }}" >> $GITHUB_ENV
      - name: Set default CHECK_DIR
        if: ${{ inputs.CHECK_CUSTOM_DIR == '' }}
        run: echo "CHECK_DIR=${{ inputs.WORKING_DIRECTORY }}" >> $GITHUB_ENV
      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changes-detected:
              - "${{ env.CHECK_DIR }}/**"

  springboot-lint-check:
    needs: workdir-has-changes
    if: ${{ !inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job)))}}
    uses: ./.github/workflows/springboot-step-lint-check.yml
    with:
      JAVA_IMAGE: ${{inputs.JAVA_IMAGE}}
      WORKING_DIRECTORY: ${{inputs.WORKING_DIRECTORY}}
      MAVEN_USER_HOME: ${{inputs.MAVEN_USER_HOME}}
      EXTRA_MAVEN_ARGS: ${{inputs.EXTRA_MAVEN_ARGS}}
      RUN: ${{inputs.RUN}}
      RUN_ON: ${{ inputs.RUN_ON_LINT }}
      RUNNERS_CONTAINER_GROUP: ${{ inputs.RUNNERS_CONTAINER_GROUP }}
    secrets: inherit

  springboot-tests:
    needs: workdir-has-changes
    if: ${{ inputs.DATABASE == 'postgres' && (!inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job))))}}
    uses: ./.github/workflows/springboot-step-tests.yml
    with:
      JAVA_IMAGE: ${{inputs.JAVA_IMAGE}}
      WORKING_DIRECTORY: ${{inputs.WORKING_DIRECTORY}}
      MAVEN_USER_HOME: ${{inputs.MAVEN_USER_HOME}}
      EXTRA_MAVEN_ARGS: ${{inputs.EXTRA_MAVEN_ARGS}}
      MAVEN_SERVER_USERNAME: ${{ inputs.MAVEN_SERVER_USERNAME }}
      MAVEN_SERVER_ID: ${{ inputs.MAVEN_SERVER_ID }}
      COVERAGE_ARTIFACT_NAME: ${{ inputs.COVERAGE_ARTIFACT_NAME }}
      USE_CI_POSTGRES: ${{ inputs.USE_CI_POSTGRES }}
      RUN: ${{ inputs.RUN }}
      RUN_ON: ${{ inputs.RUN_ON_BUILD }}
      RUNNERS_CONTAINER_GROUP: ${{ inputs.RUNNERS_CONTAINER_GROUP }}
    secrets: inherit

  springboot-tests-mysql:
    needs: workdir-has-changes
    if: ${{ inputs.DATABASE == 'mysql' && (!inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job))))}}
    uses: ./.github/workflows/springboot-step-tests-mysql.yml
    with:
      JAVA_IMAGE: ${{inputs.JAVA_IMAGE}}
      WORKING_DIRECTORY: ${{inputs.WORKING_DIRECTORY}}
      MAVEN_USER_HOME: ${{inputs.MAVEN_USER_HOME}}
      EXTRA_MAVEN_ARGS: ${{inputs.EXTRA_MAVEN_ARGS}}
      MAVEN_SERVER_USERNAME: ${{ inputs.MAVEN_SERVER_USERNAME }}
      MAVEN_SERVER_ID: ${{ inputs.MAVEN_SERVER_ID }}
      COVERAGE_ARTIFACT_NAME: ${{ inputs.COVERAGE_ARTIFACT_NAME }}
      RUN: ${{ inputs.RUN }}
      RUN_ON: ${{ inputs.RUN_ON_BUILD }}
      RUNNERS_CONTAINER_GROUP: ${{ inputs.RUNNERS_CONTAINER_GROUP }}
    secrets: inherit

  jobs-succeded:
    needs: ["springboot-lint-check", "springboot-tests", "springboot-tests-mysql"]
    runs-on:
      labels: ${{ inputs.RUN_ON }}
      group: ${{ inputs.RUNNERS_CONTAINER_GROUP }}
    if: ${{ always()}}
    steps:
      - name: "Jobs: springboot-lint-check, springboot-tests, springboot-tests-mysql didn't fail."
        run: if [[ "${{ needs.springboot-lint-check.result }}" == "failure" || "${{ needs.springboot-tests.result }}" == "failure" || "${{ needs.springboot-tests-mysql.result }}" == "failure" ]]; then exit 1; fi
