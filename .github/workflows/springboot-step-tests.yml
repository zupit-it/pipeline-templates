name: Run SpringBoot tests

on:
  workflow_call:
    inputs:
      # NOTE: RUN_ON default kept at warp-ubuntu-latest-x64-4x because we have no
      # WarpBuild profiling data for this template. Sibling workflows in this
      # directory were tuned from a 7-day provisus usage export (x.json) which
      # showed CPU-light jobs (deploy, workdir-has-changes, jobs-succeded, lint,
      # jira, release) safely fitting on a 2x runner, while build / sonar-analyze
      # / dotnet-common / lint-check-build saturated 4x. This template was not
      # exercised in that window so its CPU profile is unknown. Before lowering
      # the default to warp-ubuntu-latest-x64-2x: capture max_sustained_cpu and
      # max_memory_utilization for one full run on 4x, and downsize only if p95
      # CPU% stays below ~50% (fits in 2 vCPU at <85% load). For mixed-profile
      # templates introduce a per-job override (e.g. RUN_ON_BUILD) following the
      # split done in dotnet-step-azure-webapp-build-and-deploy.yml.
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      WORKING_DIRECTORY:
        required: true
        type: string
      JAVA_IMAGE:
        required: true
        type: string
      COVERAGE_ARTIFACT_NAME:
        required: true
        type: string
      MAVEN_USER_HOME:
        required: false
        type: string
        default: "./m2"
      EXTRA_MAVEN_ARGS:
        required: false
        type: string
        default: ""
      USE_CI_POSTGRES:
        required: false
        type: boolean
        default: true
      SPRING_APPLICATION_JSON:
        required: false
        type: string
      RUN:
        required: false
        type: boolean
        default: true
      MAVEN_SERVER_USERNAME:
        required: false
        type: string
      MAVEN_SERVER_ID:
        required: false
        type: string

env: "${{secrets}}"

jobs:
  springboot-run-tests:
    if: ${{ inputs.RUN }}
    runs-on: ${{ inputs.RUN_ON }}
    container: ${{ inputs.JAVA_IMAGE }}

    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: java-runner
          POSTGRES_PASSWORD: java-runner
          POSTGRES_DB: java

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Maven settings
        uses: zupit-it/pipeline-templates/.github/actions/maven/settings@chore/warpbuild-and-action-bumps
        with:
          MAVEN_USER_HOME: ${{ inputs.MAVEN_USER_HOME }}
          MAVEN_SERVER_ID: ${{ inputs.MAVEN_SERVER_ID }}
          MAVEN_SERVER_USERNAME: ${{ inputs.MAVEN_SERVER_USERNAME }}
          MAVEN_SERVER_PASSWORD: ${{ secrets.CI_MAVEN_SERVER_PASSWORD }}

      - name: Run tests
        run: |
          ./mvnw -ntp verify -Dmaven.repo.local=${{inputs.MAVEN_USER_HOME}} ${{inputs.EXTRA_MAVEN_ARGS}}
          ./mvnw -ntp jacoco:report -Dmaven.repo.local=${{inputs.MAVEN_USER_HOME}} ${{inputs.EXTRA_MAVEN_ARGS}}
        env:
          SPRING_APPLICATION_JSON: ${{ inputs.USE_CI_POSTGRES && inputs.SPRING_APPLICATION_JSON || '{}' }}
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.COVERAGE_ARTIFACT_NAME }}
          path: |
            ${{ inputs.WORKING_DIRECTORY }}/target/**/*.xml
            ${{ inputs.WORKING_DIRECTORY }}/target/**/*.class
          retention-days: 1
