name: Docker build and push SpringBoot image to registry

on:
  workflow_call:
    inputs:
      # NOTE: RUN_ON default kept at warp-ubuntu-latest-x64-4x because we have no
      # WarpBuild profiling data for this template. Sibling workflows in this
      # directory were tuned from a 7-day provisus usage export (x.json) which
      # showed CPU-light jobs (deploy, workdir-has-changes, jobs-succeded, lint,
      # jira, release) safely fitting on a 2x runner, while build / sonar-analyze
      # / dotnet-common / lint-check-build saturated 4x. This template was not
      # exercised in that window so its CPU profile is unknown. Before lowering
      # the default to warp-ubuntu-latest-x64-2x: capture max_sustained_cpu and
      # max_memory_utilization for one full run on 4x, and downsize only if p95
      # CPU% stays below ~50% (fits in 2 vCPU at <85% load). For mixed-profile
      # templates introduce a per-job override (e.g. RUN_ON_BUILD) following the
      # split done in dotnet-step-azure-webapp-build-and-deploy.yml.
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      JAVA_IMAGE:
        required: true
        type: string
      RELEASE_ENVIRONMENT:
        required: true
        type: string
      WORKING_DIRECTORY:
        required: true
        type: string
      REGISTRY_URL:
        required: true
        type: string
      DOCKER_IMAGE_NAME:
        required: true
        type: string
      DOCKER_IMAGE_TAG:
        required: true
        type: string
      MAVEN_USER_HOME:
        required: false
        type: string
        default: "./m2"
      EXTRA_MAVEN_ARGS:
        required: false
        type: string
        default: ""
    outputs:
      DOCKER_IMAGE_NAME:
        description: "The docker image name that has been built"
        value: ${{ jobs.docker-build-and-push.outputs.DOCKER_IMAGE_NAME }}

env: "${{secrets}}"

jobs:
  docker-build-and-push:
    runs-on: ${{ inputs.RUN_ON }}
    container: ${{ inputs.JAVA_IMAGE }}

    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}

    outputs:
      DOCKER_IMAGE_NAME: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.REGISTRY_URL }}/${{ github.repository }}/${{ inputs.DOCKER_IMAGE_NAME }}
          tags: ${{ inputs.DOCKER_IMAGE_TAG }}

      - name: Build JIB Image and publish
        run: ./mvnw -ntp compile jib:build -P${{ inputs.RELEASE_ENVIRONMENT }} -Djib.to.image=${{ steps.meta.outputs.tags }} -Djib.to.auth.username=${{ github.actor }} -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }} -Dmaven.repo.local=${{inputs.MAVEN_USER_HOME}} ${{inputs.EXTRA_MAVEN_ARGS}}
