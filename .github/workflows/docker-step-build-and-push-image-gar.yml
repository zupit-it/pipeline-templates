name: Docker build and push image to Google Artifact Registry

on:
  workflow_call:
    inputs:
      # NOTE: RUN_ON default kept at warp-ubuntu-latest-x64-4x because we have no
      # WarpBuild profiling data for this template. Sibling workflows in this
      # directory were tuned from a 7-day provisus usage export (x.json) which
      # showed CPU-light jobs (deploy, workdir-has-changes, jobs-succeded, lint,
      # jira, release) safely fitting on a 2x runner, while build / sonar-analyze
      # / dotnet-common / lint-check-build saturated 4x. This template was not
      # exercised in that window so its CPU profile is unknown. Before lowering
      # the default to warp-ubuntu-latest-x64-2x: capture max_sustained_cpu and
      # max_memory_utilization for one full run on 4x, and downsize only if p95
      # CPU% stays below ~50% (fits in 2 vCPU at <85% load). For mixed-profile
      # templates introduce a per-job override (e.g. RUN_ON_BUILD) following the
      # split done in dotnet-step-azure-webapp-build-and-deploy.yml.
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      DIND_IMAGE:
        required: false
        type: string
        default: "docker:26.0.0-dind"
      WORKING_DIRECTORY:
        required: true
        type: string
      DOCKERFILE_PATH:
        required: true
        type: string
      DOCKER_IMAGE_NAME:
        required: true
        type: string
      DOCKER_IMAGE_TAG:
        required: true
        type: string
      BUILD_ARGS:
        required: false
        type: string
        default: ""
      GCP_PROJECT_ID:
        required: true
        type: string
      GAR_LOCATION:
        required: true
        type: string
      GAR_REPOSITORY:
        required: true
        type: string
      CHECKOUT_REF:
        required: false
        type: string
        default: ""
      ENVIRONMENT:
        required: false
        type: string
        default: ""
      PRE_BUILD_SCRIPT:
        required: false
        type: string
        default: ""
    outputs:
      DOCKER_IMAGE_NAME:
        description: "The docker image name that has been built"
        value: ${{ jobs.docker-build-push-image.outputs.DOCKER_IMAGE_NAME }}

env: "${{secrets}}"

jobs:
  docker-build-push-image:
    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: ${{ inputs.RUN_ON }}
    container:
      image: ${{ inputs.DIND_IMAGE }}

    outputs:
      DOCKER_IMAGE_NAME: ${{ steps.docker.outputs.DOCKER_IMAGE_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.CHECKOUT_REF }}

      - name: Run pre-build script
        if: inputs.PRE_BUILD_SCRIPT != ''
        run: |
          echo "Executing pre-build script..."
          sh -c '${{ inputs.PRE_BUILD_SCRIPT }}'

      - name: Docker Build & Push to GAR
        id: docker
        uses: zupit-it/pipeline-templates/.github/actions/docker/build-and-push-gar@chore/warpbuild-and-action-bumps
        with:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
          GAR_LOCATION: ${{ inputs.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ inputs.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ inputs.GAR_REPOSITORY }}
          WORKING_DIRECTORY: ${{ inputs.WORKING_DIRECTORY }}
          DOCKERFILE_PATH: ${{ inputs.DOCKERFILE_PATH }}
          DOCKER_IMAGE_NAME: ${{ inputs.DOCKER_IMAGE_NAME }}
          DOCKER_IMAGE_TAG: ${{ inputs.DOCKER_IMAGE_TAG }}
          BUILD_ARGS: ${{ inputs.BUILD_ARGS }}
        env: "${{secrets}}"
