name: Conventional Commits Lint Step

on:
  workflow_call:
    inputs:
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-arm64-2x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"

jobs:
  lint-pr:
    name: Lint PR
    runs-on: ${{ inputs.RUN_ON }}
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
