name: Conventional Commits Lint Step

on:
  workflow_call:
    inputs:
      RUN_ON:
        required: false
        type: string
        default: "ubuntu-24.04"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"

jobs:
  lint-pr:
    name: Lint PR
    runs-on: ${{ inputs.RUN_ON }}
    container: node:20-alpine
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
