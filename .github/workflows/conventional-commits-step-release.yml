name: Conventional Commits Release Step

on:
  workflow_call:
    inputs:
      RUN_ON:
        required: false
        type: string
        default: "zupit-agents"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      # Unused since the job no longer runs in a container (JS actions in Alpine
      # containers are x64-only on GitHub runners); kept for call compatibility.
      DIND_IMAGE:
        required: false
        type: string
        default: "docker:26.0.0-dind"

jobs:
  release:
    name: release
    runs-on:
      labels: ${{ inputs.RUN_ON }}
      group: ${{ inputs.RUNNERS_CONTAINER_GROUP }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 16
      - name: Set NPM cache directory
        run: echo "NPM_CONFIG_CACHE=$(mktemp -d)" >> $GITHUB_ENV
      - run: npm ci --ignore-scripts
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
