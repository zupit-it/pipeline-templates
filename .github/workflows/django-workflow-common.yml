name: Django common

on:
  workflow_call:
    inputs:
      # Projects inputs
      WORKING_DIRECTORY:
        required: true
        type: string
      PYTHON_IMAGE:
        required: true
        type: string
      COVERAGE_ARTIFACT_NAME:
        required: false
        type: string
        default: "coverage-django.xml"
      SETUP_COMMANDS:
        required: false
        type: string
        default: ""
      # Workflow inputs
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-arm64-2x"
        description: "Runner for cheap jobs (workdir-has-changes, jobs-succeded). Both match cheap patterns profiled at p95 CPU < 13% on 4x in sibling templates."
      # NOTE: RUN_ON_BUILD now drives django-step-tests only. Lint moved to
      # RUN_ON_LINT (see below) after the May-2026 runner-sizing sweep showed
      # the linter is cheap. Tests stay on 4x because the suite still sits
      # comfortably under the 4-minute target there (gh-2vCPU baseline ≈ 396s
      # across 413 runs → ~115s on warp-4x). When/if the suite outgrows 4x,
      # consider 8x — but capture max_sustained_cpu first.
      RUN_ON_BUILD:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
        description: "Runner forwarded to django-step-tests. Test suite baseline ~115s on warp-4x in profiling; raise to 8x only if a new test suite saturates."
      # RUN_ON_LINT: the linter is light (gh-2vCPU baseline ≈ 241s across 413
      # runs → ~140s on warp-2x in profiling). 2x is the right default;
      # consumers with a heavier lint suite can override.
      RUN_ON_LINT:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-2x"
        description: "Runner forwarded to django-step-lint-check. p95 wall on warp-2x ≈ 140s in May-2026 sizing data."
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      RUN:
        required: false
        type: boolean
        default: true
      DJANGO_MIGRATIONS_CHECK_APPS:
        required: false
        type: string
        default: ""
      ENABLE_LFS:
        required: false
        type: boolean
        default: false
      # Workaround for https://github.com/actions/checkout/issues/1169
      LFS_REPO_PATH:
        required: false
        type: string
        default: ""
      COVERAGE_THRESHOLD:
        required: false
        type: number
        default: 50
      CHECK_WORKDIR_CHANGES:
        required: true
        type: boolean
        default: false
      CHECK_CUSTOM_DIR:
        required: false
        type: string
        default: ""
      CHECK_CHANGES_BY_JOBS:
        required: false
        type: string
        default: "all"
      DB_POSTGRES_VERSION:
        required: false
        type: string
        default: "latest"
      DB_POSTGRES_IMAGE_NAME:
        required: false
        type: string
        default: "postgres"
      DATABASE:
        required: false
        type: string
        description: "Database to use: postgres or mssql"
        default: "postgres"
      DB_MSSQL_VERSION:
        required: false
        type: string
        default: "2022-latest"
      DB_MSSQL_IMAGE_NAME:
        required: false
        type: string
        default: "mcr.microsoft.com/mssql/server"
      DB_MSSQL_DATABASE:
        required: false
        type: string
        default: "django"
      DB_MSSQL_SA_PASSWORD:
        required: false
        type: string
        default: "LocalDevPassword123!"
env:
  CHECK_DIR: ${{ inputs.WORKING_DIRECTORY }}

jobs:
  workdir-has-changes:
    runs-on: ${{ inputs.RUN_ON }}
    container: buildpack-deps:24.04-scm
    outputs:
      changes-detected: ${{ steps.filter.outputs.changes-detected }}
    steps:
      - name: Set CHECK_DIR to custom directory if provided
        if: ${{ inputs.CHECK_CUSTOM_DIR != '' }}
        run: echo "CHECK_DIR=${{ inputs.CHECK_CUSTOM_DIR }}" >> $GITHUB_ENV
      - name: Set default CHECK_DIR
        if: ${{ inputs.CHECK_CUSTOM_DIR == '' }}
        run: echo "CHECK_DIR=${{ inputs.WORKING_DIRECTORY }}" >> $GITHUB_ENV
      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changes-detected:
              - "${{ env.CHECK_DIR }}/**"

  django-lint-check:
    needs: workdir-has-changes
    if: ${{ inputs.DATABASE == 'postgres' && (!inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job))))}}
    uses: ./.github/workflows/django-step-lint-check.yml
    with:
      RUN_ON: ${{inputs.RUN_ON_LINT}}
      RUNNERS_CONTAINER_GROUP: ${{inputs.RUNNERS_CONTAINER_GROUP}}
      WORKING_DIRECTORY: ${{inputs.WORKING_DIRECTORY}}
      PYTHON_IMAGE: ${{inputs.PYTHON_IMAGE}}
      RUN: ${{inputs.RUN}}
      DJANGO_MIGRATIONS_CHECK_APPS: ${{inputs.DJANGO_MIGRATIONS_CHECK_APPS}}
      SETUP_COMMANDS: ${{inputs.SETUP_COMMANDS}}
      ENABLE_LFS: ${{inputs.ENABLE_LFS}}
      LFS_REPO_PATH: ${{inputs.LFS_REPO_PATH}}
      DB_POSTGRES_VERSION: ${{inputs.DB_POSTGRES_VERSION}}
      DB_POSTGRES_IMAGE_NAME: ${{inputs.DB_POSTGRES_IMAGE_NAME}}
    secrets: inherit

  django-lint-check-mssql:
    needs: workdir-has-changes
    if: ${{ inputs.DATABASE == 'mssql' && (!inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job))))}}
    uses: ./.github/workflows/django-step-lint-check-mssql.yml
    with:
      RUN_ON: ${{inputs.RUN_ON_LINT}}
      RUNNERS_CONTAINER_GROUP: ${{inputs.RUNNERS_CONTAINER_GROUP}}
      WORKING_DIRECTORY: ${{inputs.WORKING_DIRECTORY}}
      PYTHON_IMAGE: ${{inputs.PYTHON_IMAGE}}
      RUN: ${{inputs.RUN}}
      DJANGO_MIGRATIONS_CHECK_APPS: ${{inputs.DJANGO_MIGRATIONS_CHECK_APPS}}
      SETUP_COMMANDS: ${{inputs.SETUP_COMMANDS}}
      ENABLE_LFS: ${{inputs.ENABLE_LFS}}
      LFS_REPO_PATH: ${{inputs.LFS_REPO_PATH}}
      DB_MSSQL_VERSION: ${{inputs.DB_MSSQL_VERSION}}
      DB_MSSQL_IMAGE_NAME: ${{inputs.DB_MSSQL_IMAGE_NAME}}
      DB_MSSQL_DATABASE: ${{inputs.DB_MSSQL_DATABASE}}
      DB_MSSQL_SA_PASSWORD: ${{inputs.DB_MSSQL_SA_PASSWORD}}
    secrets: inherit

  django-tests:
    needs: workdir-has-changes
    if: ${{ inputs.DATABASE == 'postgres' && (!inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job))))}}
    uses: ./.github/workflows/django-step-tests.yml
    with:
      RUN_ON: ${{inputs.RUN_ON_BUILD}}
      RUNNERS_CONTAINER_GROUP: ${{inputs.RUNNERS_CONTAINER_GROUP}}
      WORKING_DIRECTORY: ${{ inputs.WORKING_DIRECTORY }}
      PYTHON_IMAGE: ${{ inputs.PYTHON_IMAGE }}
      COVERAGE_ARTIFACT_NAME: ${{ inputs.COVERAGE_ARTIFACT_NAME }}
      RUN: ${{inputs.RUN}}
      SETUP_COMMANDS: ${{ inputs.SETUP_COMMANDS }}
      ENABLE_LFS: ${{inputs.ENABLE_LFS}}
      LFS_REPO_PATH: ${{inputs.LFS_REPO_PATH}}
      COVERAGE_THRESHOLD: ${{inputs.COVERAGE_THRESHOLD}}
      DB_POSTGRES_VERSION: ${{inputs.DB_POSTGRES_VERSION}}
      DB_POSTGRES_IMAGE_NAME: ${{inputs.DB_POSTGRES_IMAGE_NAME}}
    secrets: inherit

  django-tests-mssql:
    needs: workdir-has-changes
    if: ${{ inputs.DATABASE == 'mssql' && (!inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job))))}}
    uses: ./.github/workflows/django-step-tests-mssql.yml
    with:
      RUN_ON: ${{inputs.RUN_ON_BUILD}}
      RUNNERS_CONTAINER_GROUP: ${{inputs.RUNNERS_CONTAINER_GROUP}}
      WORKING_DIRECTORY: ${{ inputs.WORKING_DIRECTORY }}
      PYTHON_IMAGE: ${{ inputs.PYTHON_IMAGE }}
      COVERAGE_ARTIFACT_NAME: ${{ inputs.COVERAGE_ARTIFACT_NAME }}
      RUN: ${{inputs.RUN}}
      SETUP_COMMANDS: ${{ inputs.SETUP_COMMANDS }}
      ENABLE_LFS: ${{inputs.ENABLE_LFS}}
      LFS_REPO_PATH: ${{inputs.LFS_REPO_PATH}}
      COVERAGE_THRESHOLD: ${{inputs.COVERAGE_THRESHOLD}}
      DB_MSSQL_VERSION: ${{inputs.DB_MSSQL_VERSION}}
      DB_MSSQL_IMAGE_NAME: ${{inputs.DB_MSSQL_IMAGE_NAME}}
      DB_MSSQL_DATABASE: ${{inputs.DB_MSSQL_DATABASE}}
      DB_MSSQL_SA_PASSWORD: ${{inputs.DB_MSSQL_SA_PASSWORD}}
    secrets: inherit

  jobs-succeded:
    needs: ["django-lint-check", "django-lint-check-mssql", "django-tests", "django-tests-mssql"]
    runs-on: ${{ inputs.RUN_ON }}
    if: ${{ always()}}
    steps:
      - name: "Jobs: django-lint-check, django-tests didn't fail."
        run: if [[ "${{ needs.django-lint-check.result }}" == "failure" || "${{ needs.django-lint-check-mssql.result }}" == "failure" || "${{ needs.django-tests.result }}" == "failure" || "${{ needs.django-tests-mssql.result }}" == "failure" ]]; then exit 1; fi
