name: Docker build and push node image to registry

on:
  workflow_call:
    inputs:
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
        description: "Runner for the docker-build-and-push job. NOTE: not directly profiled in the WarpBuild usage export (x.json) - this template wasn't exercised by provisus during the 7-day capture window. Kept at 4x because docker buildx + push is typically CPU-bound and IO-bound; downsizing to 2x risks longer wall time. Capture max_sustained_cpu for one full run before deciding to lower to 2x or raise to 8x."
      RUN_ON_BUILD:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
        description: "Runner for the build-node-project job. Same job ID and action as node-step-azure-storage-build-and-deploy.yml's build-node-project, which p95'd at 95% CPU on 4x in profiling - so kept at 4x and a candidate for upsizing to 8x."
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      DIND_IMAGE:
        required: false
        type: string
        default: "docker:26.0.0-dind"
      NODE_VERSION:
        required: true
        type: string
      RELEASE_ENVIRONMENT:
        required: true
        type: string
      WORKING_DIRECTORY:
        required: true
        type: string
      DOCKERFILE_PATH:
        required: true
        type: string
      DOCKER_IMAGE_NAME:
        required: true
        type: string
      DOCKER_IMAGE_TAG:
        required: true
        type: string
      BUILD_ARGS:
        required: true
        type: string
      REGISTRY_URL:
        required: false
        type: string
        default: ghcr.io
      REGISTRY_USER:
        required: false
        type: string
        default: ${{ github.actor }}
      ARTIFACT_NAME:
        required: false
        type: string
        default: node-build
      ENV_VARIABLES:
        required: false
        type: string
        default: "{}"
      PROJECT:
        required: false
        type: string
        default: ""
      IMAGE:
        required: false
        type: string
        default: "ubuntu:23.04"
      DIST_PATH:
        required: true
        type: string
      CHECKOUT_REF:
        required: false
        type: string
        default: ""

    outputs:
      DOCKER_IMAGE_NAME:
        description: "The docker image name that has been built"
        value: ${{ jobs.docker-build-and-push.outputs.DOCKER_IMAGE_NAME }}

env: "${{secrets}}"

jobs:
  build-node-project:
    runs-on: ${{ inputs.RUN_ON_BUILD }}
    container:
      image: ${{ inputs.IMAGE }}

    env: ${{ fromJson(inputs.ENV_VARIABLES) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.CHECKOUT_REF }}

      - name: NodeJS Build
        uses: zupit-it/pipeline-templates/.github/actions/node/build@v1.31.2
        with:
          NODE_VERSION: ${{ inputs.NODE_VERSION }}
          RELEASE_ENVIRONMENT: ${{ inputs.RELEASE_ENVIRONMENT }}
          WORKING_DIRECTORY: ${{ inputs.WORKING_DIRECTORY }}
          PROJECT: ${{ inputs.PROJECT }}
        env: "${{secrets}}"

      - name: Archive build
        run: tar czvf dist.tar.gz ${{ inputs.WORKING_DIRECTORY }}/${{ inputs.DIST_PATH }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.ARTIFACT_NAME }}
          path: dist.tar.gz
          retention-days: 1

  docker-build-and-push:
    runs-on: ${{ inputs.RUN_ON }}
    container:
      image: ${{ inputs.DIND_IMAGE }}

    outputs:
      DOCKER_IMAGE_NAME: ${{ steps.docker.outputs.DOCKER_IMAGE_NAME }}

    env: ${{ fromJson(inputs.ENV_VARIABLES) }}

    needs: [build-node-project]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.CHECKOUT_REF }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.ARTIFACT_NAME }}
          path: .

      - name: unpack build
        run: tar xzvf dist.tar.gz

      - name: Docker Build & Push
        id: docker
        uses: zupit-it/pipeline-templates/.github/actions/docker/build-and-push@v1.31.2
        with:
          REGISTRY_URL: ${{ inputs.REGISTRY_URL }}
          REGISTRY_USER: ${{ inputs.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          WORKING_DIRECTORY: ${{ inputs.WORKING_DIRECTORY }}
          DOCKERFILE_PATH: ${{ inputs.DOCKERFILE_PATH }}
          DOCKER_IMAGE_NAME: ${{ inputs.DOCKER_IMAGE_NAME }}
          DOCKER_IMAGE_TAG: ${{ inputs.DOCKER_IMAGE_TAG }}
          BUILD_ARGS: ${{ inputs.BUILD_ARGS }}
        env: "${{secrets}}"
