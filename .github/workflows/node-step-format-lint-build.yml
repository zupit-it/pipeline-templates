name: Lint, check and build a Javascript app

on:
  workflow_call:
    inputs:
      # NOTE: RUN_ON default kept at warp-ubuntu-latest-x64-4x because the single
      # job here (lint-check-build) saturated the 4x runner at p95 95% CPU in
      # the 7-day provisus profiling export. Downsizing to 2x would slow lint /
      # build noticeably; if anything this is a candidate for upsizing to
      # warp-ubuntu-latest-x64-8x (extra ~$0.008/min, halves wall time on
      # CPU-bound workloads). Callers can already override RUN_ON per call.
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      NODE_VERSION:
        required: true
        type: string
      WORKING_DIRECTORY:
        required: true
        type: string
      RUN:
        required: false
        type: boolean
        default: true
      PROJECT:
        required: false
        type: string
        default: ""
      IMAGE:
        required: false
        type: string
        default: "ubuntu:23.04"

env: "${{secrets}}"

jobs:
  lint-check-build:
    if: ${{ inputs.RUN }}
    runs-on: ${{ inputs.RUN_ON }}
    container:
      image: ${{ inputs.IMAGE }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ inputs.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.WORKING_DIRECTORY }}/**/package-lock.json

      # Set NPM cache directory to a new clean directory to avoid sharing with other runners
      - name: Set NPM cache directory
        run: echo "NPM_CONFIG_CACHE=~/.npm$(npm -v)" >> $GITHUB_ENV

      - name: Authenticate with private NPM package
        if: ${{ env.github_token }}
        run: echo "//npm.pkg.github.com/:_authToken=${{ env.github_token }}" > ~/.npmrc

      - run: npm ci

      # GENERIC
      - run: npm run ci:format:check
        if: ${{ inputs.PROJECT == '' }}

      - run: npm run ci:lint
        if: ${{ inputs.PROJECT == '' }}

      - run: npm run ci:build
        if: ${{ inputs.PROJECT == '' }}

      # PROJECT SPECIFIC
      - run: npm run ${{ inputs.PROJECT }}:ci:format:check
        if: ${{ inputs.PROJECT != '' }}

      - run: npm run ${{ inputs.PROJECT }}:ci:lint
        if: ${{ inputs.PROJECT != '' }}

      - run: npm run ${{ inputs.PROJECT }}:ci:build
        if: ${{ inputs.PROJECT != '' }}
