name: Sonar analyze with artifacts

on:
  workflow_call:
    inputs:
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-2x"
        description: "Runner for cheap jobs (workdir-has-changes, jobs-succeded). Both match cheap patterns profiled at p95 CPU < 13% on 4x in sibling templates."
      # NOTE: RUN_ON_ANALYZE default kept at warp-ubuntu-latest-x64-4x because
      # we have no direct WarpBuild profiling data for the Spring Boot
      # sonar-analyze job. The .NET equivalent (sonar-step-dotnet-analyze.yml)
      # saturated 4x at p95 99% CPU and the Maven sonar:sonar goal generally
      # has comparable load (compile + tests + analysis). Before lowering this
      # to 2x: capture max_sustained_cpu for one full run on 4x and only
      # downsize if p95 CPU% stays below ~50%. If anything this is a candidate
      # for upsizing to 8x.
      RUN_ON_ANALYZE:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-4x"
        description: "Runner for the Spring Boot sonar-analyze job. See note above - kept at 4x by analogy with sonar-step-dotnet-analyze.yml; not directly profiled."
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      WORKING_DIRECTORY:
        required: true
        type: string
      JAVA_IMAGE:
        required: true
        type: string
      CHECK_QUALITY_GATE:
        required: false
        type: boolean
        default: false
      DOWNLOAD_ARTIFACT:
        required: false
        type: boolean
        default: true
      ARTIFACT_FILENAME:
        required: false
        type: string
        default: ""
      ARTIFACT_PATH:
        required: false
        type: string
        default: ".coverage-reports/"
      PRE_SCAN_COMMANDS:
        required: false
        type: string
        default: ""
      MAVEN_USER_HOME:
        required: false
        type: string
        default: "./m2"
      EXTRA_MAVEN_ARGS:
        required: false
        type: string
        default: ""
      CHECK_WORKDIR_CHANGES:
        required: true
        type: boolean
        default: false
      CHECK_CUSTOM_DIR:
        required: false
        type: string
        default: ""
      CHECK_CHANGES_BY_JOBS:
        required: false
        type: string
        default: "all"
      MAVEN_SERVER_ID:
        required: false
        type: string
      MAVEN_SERVER_USERNAME:
        required: false
        type: string

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CHECK_DIR: ${{ inputs.WORKING_DIRECTORY }}

jobs:
  workdir-has-changes:
    runs-on: ${{ inputs.RUN_ON }}
    container: buildpack-deps:24.04-scm
    outputs:
      changes-detected: ${{ steps.filter.outputs.changes-detected }}
    steps:
      - name: Set CHECK_DIR to custom directory if provided
        if: ${{ inputs.CHECK_CUSTOM_DIR != '' }}
        run: echo "CHECK_DIR=${{ inputs.CHECK_CUSTOM_DIR }}" >> $GITHUB_ENV
      - name: Set default CHECK_DIR
        if: ${{ inputs.CHECK_CUSTOM_DIR == '' }}
        run: echo "CHECK_DIR=${{ inputs.WORKING_DIRECTORY }}" >> $GITHUB_ENV
      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changes-detected:
              - "${{ env.CHECK_DIR }}/**"

  sonar-analyze:
    needs: workdir-has-changes
    if: ${{ !inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job)))}}
    runs-on: ${{ inputs.RUN_ON_ANALYZE }}
    container: ${{ inputs.JAVA_IMAGE }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Maven settings
        uses: zupit-it/pipeline-templates/.github/actions/maven/settings@chore/warpbuild-and-action-bumps
        with:
          MAVEN_USER_HOME: ${{ inputs.MAVEN_USER_HOME }}
          MAVEN_SERVER_ID: ${{ inputs.MAVEN_SERVER_ID }}
          MAVEN_SERVER_USERNAME: ${{ inputs.MAVEN_SERVER_USERNAME }}
          MAVEN_SERVER_PASSWORD: ${{ secrets.CI_MAVEN_SERVER_PASSWORD }}

      - name: Download coverage artifact
        if: ${{ inputs.DOWNLOAD_ARTIFACT }}
        uses: actions/download-artifact@v4
        with:
          name: ${{inputs.ARTIFACT_FILENAME}}
          path: ${{ inputs.WORKING_DIRECTORY }}/${{ inputs.ARTIFACT_PATH }}

      - name: Run PRE_SCAN_COMMANDS commands
        if: ${{ inputs.PRE_SCAN_COMMANDS != '' }}
        run: ${{ inputs.PRE_SCAN_COMMANDS }}

      - name: Run Sonar
        run: ./mvnw -ntp initialize org.sonarsource.scanner.maven:sonar-maven-plugin:sonar --settings ${{inputs.MAVEN_USER_HOME}}/settings.xml -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.login=${{ secrets.SONAR_TOKEN }} -Dsonar.qualitygate.wait=${{ inputs.CHECK_QUALITY_GATE }}

  jobs-succeded:
    needs: ["sonar-analyze"]
    runs-on: ${{ inputs.RUN_ON }}
    if: ${{ always()}}
    steps:
      - name: "Jobs: sonar-analyze didn't fail."
        run: if [[ "${{ needs.sonar-analyze.result }}" == "failure" ]]; then exit 1; fi
