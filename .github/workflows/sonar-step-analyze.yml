name: Sonar analyze with artifacts

on:
  workflow_call:
    inputs:
      RUN_ON:
        required: false
        type: string
        default: "warp-ubuntu-latest-arm64-2x"
        description: "Runner for cheap jobs (workdir-has-changes, jobs-succeded). p95 CPU < 13% on 4x in reference-project profiling."
      RUN_ON_ANALYZE:
        required: false
        type: string
        default: "warp-ubuntu-latest-x64-2x"
        description: "Runner for the sonar-analyze job. This flavor only downloads the coverage artifact and runs sonar-scanner + quality-gate wait (no compile), so it is IO/wait-bound - 2x by default. Confirm CPU with warpbuild-analysis before assuming 4x helps: a bigger runner cannot shorten the gate wait. Raise per-consumer for very large codebases. Kept on x64: the pinned sonar-scanner-cli image is amd64-only."
      RUNNERS_CONTAINER_GROUP:
        required: false
        type: string
        default: "Container"
      WORKING_DIRECTORY:
        required: true
        type: string
      SONAR_IMAGE:
        required: false
        type: string
        default: "sonarsource/sonar-scanner-cli:10.0.2.1398_5.0.1"
      CHECK_QUALITY_GATE:
        required: false
        type: boolean
        default: false
      DOWNLOAD_ARTIFACT:
        required: false
        type: boolean
        default: true
      ARTIFACT_FILENAME:
        required: false
        type: string
        default: ""
      ARTIFACT_PATH:
        required: false
        type: string
        default: ".coverage-reports/"
      CHECK_WORKDIR_CHANGES:
        required: true
        type: boolean
        default: false
      CHECK_CUSTOM_DIR:
        required: false
        type: string
        default: ""
      CHECK_CHANGES_BY_JOBS:
        required: false
        type: string
        default: "all"
env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CHECK_DIR: ${{ inputs.WORKING_DIRECTORY }}

jobs:
  workdir-has-changes:
    runs-on: ${{ inputs.RUN_ON }}
    container: buildpack-deps:24.04-scm
    outputs:
      changes-detected: ${{ steps.filter.outputs.changes-detected }}
    steps:
      - name: Set CHECK_DIR to custom directory if provided
        if: ${{ inputs.CHECK_CUSTOM_DIR != '' }}
        run: echo "CHECK_DIR=${{ inputs.CHECK_CUSTOM_DIR }}" >> $GITHUB_ENV
      - name: Set default CHECK_DIR
        if: ${{ inputs.CHECK_CUSTOM_DIR == '' }}
        run: echo "CHECK_DIR=${{ inputs.WORKING_DIRECTORY }}" >> $GITHUB_ENV
      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changes-detected:
              - "${{ env.CHECK_DIR }}/**"
  sonar-analyze:
    needs: workdir-has-changes
    if: ${{ !inputs.CHECK_WORKDIR_CHANGES || (needs.workdir-has-changes.outputs.changes-detected == 'true' && (inputs.CHECK_CHANGES_BY_JOBS == 'all' || contains(fromJson(inputs.CHECK_CHANGES_BY_JOBS), github.job)))}}
    runs-on: ${{ inputs.RUN_ON_ANALYZE }}
    container:
      image: ${{ inputs.SONAR_IMAGE }}
      options: --user root
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sonar step analyze with artifacts
        id: sonar
        uses: zupit-it/pipeline-templates/.github/actions/sonar/analyze@chore/warpbuild-and-action-bumps
        with:
          WORKING_DIRECTORY: ${{ inputs.WORKING_DIRECTORY }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          CHECK_QUALITY_GATE: ${{ inputs.CHECK_QUALITY_GATE }}
          DOWNLOAD_ARTIFACT: ${{ inputs.DOWNLOAD_ARTIFACT }}
          ARTIFACT_FILENAME: ${{ inputs.ARTIFACT_FILENAME }}
          ARTIFACT_PATH: ${{ inputs.ARTIFACT_PATH }}
        env: "${{secrets}}"

  jobs-succeded:
    needs: ["sonar-analyze"]
    runs-on: ${{ inputs.RUN_ON }}
    if: ${{ always()}}
    steps:
      - name: "Jobs: sonar-analyze didn't fail."
        run: if [[ "${{ needs.sonar-analyze.result }}" == "failure" ]]; then exit 1; fi
